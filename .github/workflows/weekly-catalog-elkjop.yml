name: Weekly Catalog - Elkjop

# Elkjop 每周在售目录使用站点前端同源的 Algolia 搜索 API。
# 与 Boulanger/Currys 拆开，避免任一渠道失败阻塞其它 catalog 提交。
on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:
    inputs:
      max_items:
        description: "手动 smoke test 输出上限；留空/0 表示完整目录"
        required: false
        default: "0"

concurrency:
  group: weekly-catalog-elkjop
  cancel-in-progress: false

jobs:
  catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      CATALOG_MAX_ITEMS: ${{ inputs.max_items || '0' }}
      # GitHub 托管出口无法通过 Elkjop/Vercel Challenge；只把短时搜索 key
      # 经带鉴权的非 GitHub 中转取得，目录抓取与完整性校验仍在本 job 内完成。
      ELKJOP_KEY_RELAY_URL: ${{ secrets.ELKJOP_KEY_RELAY_URL }}
      ELKJOP_KEY_RELAY_TOKEN: ${{ secrets.ELKJOP_KEY_RELAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Scrape Elkjop catalog via API
        working-directory: scripts
        env:
          HEADLESS_MODE: "true"
          PYTHONUNBUFFERED: "1"
          CHANNELS: "Elkjop"
          ELKJOP_CATALOG_API: "true"
          ELKJOP_CATALOG_PAGE_FALLBACK: "false"
          ELKJOP_MAX_ITEMS: ${{ env.CATALOG_MAX_ITEMS }}
        run: python -m catalog_scrape.run_weekly --only Elkjop

      - name: Commit Elkjop catalog
        run: |
          set -e
          git config user.name "tvrend-scraper bot"
          git config user.email "actions@github.com"
          if [ "${CATALOG_MAX_ITEMS:-0}" != "0" ]; then
            echo "手动 smoke test（ELKJOP_MAX_ITEMS=${CATALOG_MAX_ITEMS}），跳过 catalog 提交。"
            exit 0
          fi
          git add -- catalog/elkjop_no_*.csv
          if git diff --cached --quiet; then
            echo "无新 Elkjop catalog，跳过提交。"
            exit 0
          fi
          git commit -m "chore: weekly elkjop catalog ${{ github.run_id }} [skip ci]"
          BR="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            if git pull --rebase -X theirs origin "$BR" && git push origin "HEAD:$BR"; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((i * 3))
          done
          echo "::error::推送失败。"
          exit 1
