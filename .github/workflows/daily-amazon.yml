name: Daily Amazon Catalog

# 每天抓 Amazon 多市场五品牌电视清单+价(catalog-driven Option C)。
# DE: 已验证固定 canary；GB: 邮编 CV4 7ES，先用地址成功 + GBP 搜索价守门。
# 各市场分 job 跑并汇总提交，避免 GB 初期波动影响 DE 已稳定链路。
on:
  schedule:
    - cron: "0 4 * * *"   # 每天 04:00 UTC(GitHub 实际迟到 2-6h → 约 06-10 UTC,赶在私库 enrich 12 UTC 前)
  workflow_dispatch:
    inputs:
      amazon_max_pages:
        description: "Amazon 每品牌翻页数(默认 15)"
        required: false
        default: "15"

# 同一时刻只跑一个,防与上一轮/并发抢提交
concurrency:
  group: daily-amazon-catalog
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape ${{ matrix.market }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - market: amazon_de
            country: de
            experimental: false
          - market: amazon_gb
            country: gb
            experimental: true
          - market: amazon_it
            country: it
            experimental: true
          - market: amazon_es
            country: es
            experimental: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run Amazon catalog unit tests
        run: python -m unittest discover -s tests -v

      - name: Scrape Amazon catalog（set address + canary + fail-closed)
        working-directory: scripts
        env:
          HEADLESS_MODE: "true"
          AMAZON_MAX_PAGES: ${{ inputs.amazon_max_pages || '15' }}
          AMAZON_TARGET_YEARS: "2025,2026"
          AMAZON_YEAR_MAX_PAGES: "2"
          AMAZON_MAX_SERIES_RESCUE_QUERIES: "40"
          AMAZON_MAX_VARIANT_SEEDS: "64"
          AMAZON_MAX_VARIANTS_PER_SEED: "12"
          AMAZON_SESSION_PREP_ATTEMPTS: "3"
        run: python -m catalog_scrape.run_weekly --only ${{ matrix.market }}

      - name: Stage catalog artifact
        run: |
          set -e
          mkdir -p _amazon_out
          today="$(date -u +%Y%m%d)"
          f="catalog/amazon_${{ matrix.country }}_${today}.csv"
          if [ ! -f "$f" ]; then
            echo "::error::Expected catalog not found: $f"
            exit 1
          fi
          cp "$f" _amazon_out/

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: amazon-catalog-${{ matrix.country }}
          path: _amazon_out/*.csv
          if-no-files-found: error

  commit:
    name: Commit Amazon catalogs
    runs-on: ubuntu-latest
    needs: scrape
    # 只有必需市场全部成功时才提交，避免 DE 失败时把 GB 或其他部分产物误提交。
    # matrix 中 experimental=true 的市场使用 continue-on-error，不会阻断这里。
    if: needs.scrape.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download successful catalog artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: amazon-catalog-*
          path: catalog
          merge-multiple: true

      - name: Commit catalog（清理旧份 + rebase 重试，防并发）
        run: |
          set -e
          git config user.name "tvrend-scraper bot"
          git config user.email "actions@github.com"
          # 每个 Amazon 国家只留最近 14 份 catalog,防 public 仓膨胀(私库 enrich 每天消费最新即可)
          for c in de gb it es; do
            ls catalog/amazon_${c}_*.csv 2>/dev/null | sort | head -n -14 | while read -r f; do
              git rm -f "$f" >/dev/null 2>&1 || rm -f "$f"
            done
          done
          git add -A -- catalog/
          if git diff --cached --quiet; then
            echo "无新目录（canary/fail-closed 可能 abort 了，或同日已抓），跳过提交。"
            exit 0
          fi
          git commit -m "chore: daily amazon catalog ${{ github.run_id }} [skip ci]"
          BR="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            if git pull --rebase -X theirs origin "$BR" && git push origin "HEAD:$BR"; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((i * 3))
          done
          echo "::error::推送失败。"
          exit 1
