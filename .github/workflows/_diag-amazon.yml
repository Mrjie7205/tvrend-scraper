name: _diag amazon online

# 临时诊断:看 GitHub runner 上 Amazon DE 实际给什么(IP/配送国/币种/价)。验完删。
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Runner IP + geo
        run: curl -s https://ipinfo.io/json || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Diag scrape Amazon
        working-directory: scripts
        run: python _diag_amazon.py
