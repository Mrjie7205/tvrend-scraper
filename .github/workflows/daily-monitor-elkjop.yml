name: Daily Price Monitor - Elkjop

# Elkjop 由 Vercel Security Checkpoint 保护，GitHub Actions 上耗时和失败风险
# 明显高于 Boulanger/Currys，因此独立调度，避免拖住其它渠道的每日价格提交。
on:
  schedule:
    - cron: "45 6 * * *"
  workflow_dispatch:
    inputs:
      max_skus:
        description: "手动测试用：最多抓取 SKU 数；留空/0 表示全量"
        required: false
        default: "0"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    env:
      MONITOR_INPUT_MAX_SKUS: ${{ inputs.max_skus || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run Elkjop daily monitor
        working-directory: scripts
        env:
          HEADLESS_MODE: "true"
          PYTHONUNBUFFERED: "1"
          MONITOR_CONCURRENCY: "3"
          MONITOR_MAX_SKUS: ${{ env.MONITOR_INPUT_MAX_SKUS }}
          ELKJOP_DIRECT_PRICE: "true"
          CHANNELS: "Elkjop"
        run: python -m monitor_prices.run_daily

      - name: Upload debug screenshots(失败 SKU 截图)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-elkjop-debug-${{ github.run_id }}
          path: scripts/debug_screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit prices.csv（rebase 重试，防并发）
        run: |
          set -e
          git config user.name "tvrend-scraper bot"
          git config user.email "actions@github.com"
          if [ "${MONITOR_INPUT_MAX_SKUS:-0}" != "0" ]; then
            echo "手动 Elkjop smoke test（MONITOR_MAX_SKUS=${MONITOR_INPUT_MAX_SKUS}），跳过 prices.csv 提交。"
            exit 0
          fi
          git add -- raw/prices.csv
          if git diff --cached --quiet; then
            echo "无新数据，跳过提交。"
            exit 0
          fi
          git commit -m "chore: daily elkjop prices ${{ github.run_id }} [skip ci]"
          BR="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            if git pull --rebase -X theirs origin "$BR" && git push origin "HEAD:$BR"; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((i * 3))
          done
          echo "::error::推送失败。"
          exit 1
